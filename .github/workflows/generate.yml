name: Regenerate

on:
  repository_dispatch:
    types: [openapi-updated]
  workflow_dispatch:

jobs:
  generate:
    name: Regenerate from OpenAPI
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Setup Java (for openapi-generator)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install OpenAPI Generator
        run: |
          npm install -g @openapitools/openapi-generator-cli

      - name: Fetch latest OpenAPI spec
        run: |
          curl -f -o openapi.yaml https://zernio.com/openapi.yaml
          echo "Fetched OpenAPI spec"

      - name: Clean generated files
        run: |
          # Remove both the Zernio tree (for re-gen) and the legacy Late tree
          # (carried over from before the rebrand) so the next generation
          # produces a clean lib/zernio-sdk/ tree.
          rm -rf lib/zernio-sdk lib/zernio-sdk.rb zernio-sdk.gemspec
          rm -rf lib/late-sdk lib/late-sdk.rb late-sdk.gemspec late.gemspec
          rm -rf lib/late lib/late.rb
          rm -rf docs spec

      - name: Generate SDK
        run: |
          openapi-generator-cli generate \
            -i openapi.yaml \
            -g ruby \
            -o . \
            --skip-validate-spec \
            --additional-properties=gemName=zernio-sdk,moduleName=Zernio,gemVersion=0.1.0 \
            --inline-schema-name-mappings "getGoogleBusinessLocationDetails_200_response_specialHours_specialHourPeriods_inner_startDate=GbpSpecialHourPeriodStartDate,getGoogleBusinessLocationDetails_200_response_specialHours_specialHourPeriods_inner=GbpSpecialHourPeriod,getGoogleBusinessLocationDetails_200_response_serviceItems_inner_freeFormServiceItem_label=GbpFreeFormServiceItemLabel,updateGoogleBusinessLocationDetails_request_serviceItems_inner_freeFormServiceItem_label=GbpUpdateFreeFormServiceItemLabel" \
            --git-user-id=zernio-dev \
            --git-repo-id=zernio-ruby

      - name: Add Late alias to zernio-sdk.rb
        run: |
          # Keep existing Late::... callers working by aliasing to Zernio.
          if ! grep -q 'Late = Zernio' lib/zernio-sdk.rb; then
            echo '' >> lib/zernio-sdk.rb
            echo '# Late alias for backwards compatibility with the pre-rebrand gem' >> lib/zernio-sdk.rb
            echo 'Late = Zernio unless defined?(Late)' >> lib/zernio-sdk.rb
          fi

      - name: Create late-sdk.rb legacy entry point
        run: |
          # Users who `require "late-sdk"` still get the full SDK via the alias.
          printf '%s\n' "# Legacy entry point - forwards to zernio-sdk" "require 'zernio-sdk'" "" "# Alias the module so existing Late::... code keeps working" "Late = Zernio unless defined?(Late)" > lib/late-sdk.rb

      - name: Patch README install instructions
        run: |
          python3 -c "
          import re, textwrap
          with open('README.md', 'r') as f:
              content = f.read()
          install_section = textwrap.dedent('''## Installation

          Install via RubyGems:

          \`\`\`bash
          gem install zernio-sdk
          \`\`\`

          Or add it to your Gemfile:

          \`\`\`ruby
          gem \"zernio-sdk\"
          \`\`\`

          The legacy \`late-sdk\` gem is still published for backwards compatibility and exposes the same API (\`Late = Zernio\`).''')
          content = re.sub(r'## Installation.*?(?=\n## )', install_section + '\n\n', content, flags=re.DOTALL)
          with open('README.md', 'w') as f:
              f.write(content)
          "

      - name: Install dependencies
        run: bundle install

      - name: Run tests
        run: bundle exec rake spec

      - name: Check for changes
        id: changes
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Get next version
        if: steps.changes.outputs.has_changes == 'true'
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          NEW_VERSION=$(echo $LATEST_TAG | awk -F. '{printf "v%d.%d.%d", $1, $2, $3+1}' | sed 's/vv/v/')
          GEM_VERSION=$(echo $NEW_VERSION | sed 's/v//')
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "gem_version=$GEM_VERSION" >> $GITHUB_OUTPUT

      - name: Update gem version
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          sed -i "s/VERSION = '.*'/VERSION = '${{ steps.version.outputs.gem_version }}'/" lib/zernio-sdk/version.rb

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: regenerate from OpenAPI spec

          - Auto-generated SDK updates
          - Version: ${{ steps.version.outputs.new_version }}"
          git push

      - name: Setup RubyGems credentials
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          mkdir -p ~/.gem
          echo -e "---\n:rubygems_api_key: ${{ secrets.RUBYGEMS_API_KEY }}" > ~/.gem/credentials
          chmod 0600 ~/.gem/credentials

      - name: Build and publish zernio-sdk (primary)
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          gem build zernio-sdk.gemspec
          gem push zernio-sdk-${{ steps.version.outputs.gem_version }}.gem
        continue-on-error: true

      - name: Build and publish late-sdk (legacy alias)
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          # Copy the gemspec with s.name swapped to "late-sdk" so the legacy gem
          # keeps being published at the same version.
          cp zernio-sdk.gemspec late-sdk.gemspec
          sed -i 's/s.name        = "zernio-sdk"/s.name        = "late-sdk"/' late-sdk.gemspec
          gem build late-sdk.gemspec
          gem push late-sdk-${{ steps.version.outputs.gem_version }}.gem
          rm -f late-sdk.gemspec
        continue-on-error: true

      - name: Create GitHub Release
        if: steps.changes.outputs.has_changes == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.new_version }}
          name: ${{ steps.version.outputs.new_version }}
          generate_release_notes: true
          body: |
            ## Auto-generated SDK Update

            ```bash
            gem install zernio-sdk
            # or, for backwards compatibility with the pre-rebrand gem
            gem install late-sdk
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
